name: Build XPNS APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required by Android Gradle) ───────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Set up Flutter ─────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # ── 4. Download Google Fonts (Bebas Neue + Space Mono) ────────────────
      - name: Download fonts
        run: |
          mkdir -p assets/fonts

          # Bebas Neue
          curl -L "https://github.com/dharmatype/Bebas-Neue/raw/master/fonts/BebasNeue(2018)ByDharmaType.zip" -o bebas.zip
          unzip -o bebas.zip -d bebas_tmp
          find bebas_tmp -name "*.ttf" | head -1 | xargs -I{} cp {} assets/fonts/BebasNeue-Regular.ttf
          rm -rf bebas.zip bebas_tmp

          # Space Mono (from Google Fonts GitHub mirror)
          curl -L "https://github.com/googlefonts/spacemono/raw/main/fonts/SpaceMono-Regular.ttf" -o assets/fonts/SpaceMono-Regular.ttf
          curl -L "https://github.com/googlefonts/spacemono/raw/main/fonts/SpaceMono-Bold.ttf" -o assets/fonts/SpaceMono-Bold.ttf
          curl -L "https://github.com/googlefonts/spacemono/raw/main/fonts/SpaceMono-Italic.ttf" -o assets/fonts/SpaceMono-Italic.ttf
          curl -L "https://github.com/googlefonts/spacemono/raw/main/fonts/SpaceMono-BoldItalic.ttf" -o assets/fonts/SpaceMono-BoldItalic.ttf

          echo "Fonts downloaded:"
          ls -lh assets/fonts/

      # ── 5. Install Flutter dependencies ───────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 6. Verify Flutter setup ───────────────────────────────────────────
      - name: Flutter doctor
        run: flutter doctor -v

      # ── 7. Analyze code (non-blocking) ────────────────────────────────────
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos || true

      # ── 8. Build DEBUG APK (always works, no signing needed) ─────────────
      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      # ── 9. Build RELEASE APK (unsigned — signed step below is optional) ──
      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      # ── 10. Rename APKs with version + timestamp ──────────────────────────
      - name: Rename APK files
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          mkdir -p output

          cp build/app/outputs/flutter-apk/app-debug.apk \
             output/xpns-debug-${TIMESTAMP}-${SHORT_SHA}.apk

          cp build/app/outputs/flutter-apk/app-release.apk \
             output/xpns-release-${TIMESTAMP}-${SHORT_SHA}.apk

          echo "APK_TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          echo "APK_SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

          echo "Output files:"
          ls -lh output/

      # ── 11. Upload APK as GitHub Actions artifact ─────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: xpns-debug-apk-${{ env.APK_SHORT_SHA }}
          path: output/xpns-debug-*.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: xpns-release-apk-${{ env.APK_SHORT_SHA }}
          path: output/xpns-release-*.apk
          retention-days: 90

      # ── 12. Create GitHub Release on version tags (e.g. v1.0.0) ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.apk
          name: "XPNS ${{ github.ref_name }}"
          body: |
            ## ★ XPNS TRACKER ${{ github.ref_name }} ★

            ### Install
            1. Download `xpns-release-*.apk`
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the APK file to install

            ### What's new
            See commit history for changes.

            Built automatically by GitHub Actions 🤖
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 13. Print download instructions ───────────────────────────────────
      - name: Print summary
        run: |
          echo "## ★ BUILD COMPLETE ★" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APKs built:" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in output/*.apk; do
            SIZE=$(du -sh "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to download:" >> $GITHUB_STEP_SUMMARY
          echo "Go to **Actions** tab → click this run → scroll to **Artifacts** section → download the APK" >> $GITHUB_STEP_SUMMARY
