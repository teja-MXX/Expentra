name: Build XPNS APK

on:
push:
branches: [main, master]
pull_request:
branches: [main, master]
workflow_dispatch:

jobs:
build-apk:
name: Build APK
runs-on: ubuntu-latest

```
steps:
  # 📥 Checkout
  - name: Checkout repository
    uses: actions/checkout@v4

  # ☕ Java setup
  - name: Set up Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  # 🐦 Flutter setup
  - name: Set up Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: 3.19.0
      channel: stable
      cache: true

  # 🔍 Verify assets (optional)
  - name: Verify fonts exist
    run: ls -lh assets/fonts/ || true

  # 📦 Dependencies
  - name: Flutter pub get
    run: flutter pub get

  # 🧪 Analyze (non-blocking)
  - name: Flutter analyze
    run: flutter analyze --no-fatal-infos || true

  # 📜 Accept Android licenses
  - name: Accept Android licenses
    run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

  # 🧹 Clean build
  - name: Clean project
    run: flutter clean

  # 🔨 Build DEBUG APK
  - name: Build debug APK
    run: flutter build apk --debug --no-tree-shake-icons

  # 🧾 Debug output (IMPORTANT)
  - name: List build outputs
    run: |
      echo "==== BUILD OUTPUTS ===="
      ls -R build/app/outputs || true

  # 📦 Find & store DEBUG APK safely
  - name: Collect debug APK
    run: |
      TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
      SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

      mkdir -p output

      APK=$(find build -type f -name "app-debug.apk" | head -1)

      if [ -z "$APK" ]; then
        echo "❌ Debug APK not found!"
        exit 1
      fi

      echo "✅ Found debug APK: $APK"

      DEST=output/xpns-debug-${TIMESTAMP}-${SHORT_SHA}.apk
      cp "$APK" "$DEST"

      echo "APK_SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
      echo "DEBUG_APK_PATH=${DEST}" >> $GITHUB_ENV

      ls -lh output/

  # ⬆ Upload DEBUG artifact
  - name: Upload debug APK
    uses: actions/upload-artifact@v4
    with:
      name: xpns-debug-apk-${{ env.APK_SHORT_SHA }}
      path: ${{ env.DEBUG_APK_PATH }}
      retention-days: 30

  # 🔨 Build RELEASE APK
  - name: Build release APK
    run: flutter build apk --release --no-tree-shake-icons

  # 📦 Collect RELEASE APK safely
  - name: Collect release APK
    run: |
      TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
      SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

      mkdir -p output_release

      APK=$(find build -type f -name "app-release.apk" | head -1)

      if [ -z "$APK" ]; then
        echo "❌ Release APK not found!"
        exit 1
      fi

      echo "✅ Found release APK: $APK"

      DEST=output_release/xpns-release-${TIMESTAMP}-${SHORT_SHA}.apk
      cp "$APK" "$DEST"

      echo "RELEASE_APK_PATH=${DEST}" >> $GITHUB_ENV

      ls -lh output_release/

  # ⬆ Upload RELEASE artifact
  - name: Upload release APK
    uses: actions/upload-artifact@v4
    with:
      name: xpns-release-apk-${{ env.APK_SHORT_SHA }}
      path: ${{ env.RELEASE_APK_PATH }}
      retention-days: 90

  # 🚀 Create GitHub Release (only for tags like v1.0.0)
  - name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    uses: softprops/action-gh-release@v2
    with:
      files: |
        ${{ env.DEBUG_APK_PATH }}
        ${{ env.RELEASE_APK_PATH }}
      name: "XPNS ${{ github.ref_name }}"
      body: |
        ## ★ XPNS TRACKER ${{ github.ref_name }} ★
        Download the APK and install on your device.
      draft: false
      prerelease: false
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 📊 Summary
  - name: Summary
    run: |
      echo "## ★ BUILD COMPLETE ★" >> $GITHUB_STEP_SUMMARY
      echo "Artifacts are available in this run." >> $GITHUB_STEP_SUMMARY
```
